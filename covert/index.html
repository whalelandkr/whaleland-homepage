<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>C.O.V.E.R.T | Seoul Secret Mission</title>
  <meta name="description" content="C.O.V.E.R.T Seoul Secret Mission stamp tour product page." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="covert-product-page">
  <header class="covert-header">
    <a class="covert-brand" href="./">
      <img src="./assets/covert-agent-identification.png" alt="" />
      <span>C.O.V.E.R.T</span>
    </a>

    <nav class="covert-nav" aria-label="C.O.V.E.R.T navigation">
      <a href="./briefing/" data-link="briefing"></a>
      <a href="#kit" data-copy="navKit"></a>
      <a href="#zones" data-copy="navZones"></a>
      <a href="./store/" data-link="store"></a>
      <a href="./report/" data-link="report"></a>
    </nav>

    <nav class="language-switcher" aria-label="Language selector">
      <button type="button" data-lang="kr">KR</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="jp">JP</button>
      <button type="button" data-lang="cn">CN</button>
    </nav>
  </header>

  <main>
    <section class="product-hero">
      <div class="hero-copy">
        <p class="eyebrow" data-copy="productEyebrow"></p>
        <h1 data-copy="productTitle"></h1>
        <p class="hero-lead" data-copy="productLead"></p>

        <div class="hero-actions">
          <a class="button button-primary" href="./store/" data-link="storeCta"></a>
          <a class="button button-ghost" href="./briefing/" data-link="briefingCta"></a>
        </div>
      </div>

      <div class="hero-characters" aria-hidden="true">
        <img class="bumi-side bumi-side-one" src="./assets/bumi/bumi-tourist.png" alt="" />
        <img class="bumi-side bumi-side-two" src="./assets/bumi/bumi-hanbok-blue.png" alt="" />
        <img class="bumi-main" src="./assets/bumi/bumi-black-suit.png" alt="" />
        <img class="bumi-side bumi-side-three" src="./assets/bumi/bumi-varsity.png" alt="" />
        <img class="bumi-side bumi-side-four" src="./assets/bumi/bumi-school.png" alt="" />
      </div>
    </section>

    <section class="product-section kit-section" id="kit">
      <div class="section-head">
        <p class="eyebrow" data-copy="kitEyebrow"></p>
        <h2 data-copy="kitTitle"></h2>
        <p data-copy="kitLead"></p>
      </div>

      <div class="kit-grid" id="kitGrid"></div>
    </section>

    <section class="product-section zones-section" id="zones">
      <div class="zones-card">
        <div>
          <p class="eyebrow" data-copy="zonesEyebrow"></p>
          <h2 data-copy="zonesTitle"></h2>
          <p data-copy="zonesLead"></p>
        </div>
        <div class="zone-list" id="zoneList"></div>
      </div>
    </section>

    <section class="product-section store-teaser">
      <div class="store-teaser-card">
        <img src="./assets/bumi/bumi-default.png" alt="" class="store-bumi" />
        <div>
          <p class="eyebrow" data-copy="storeEyebrow"></p>
          <h2 data-copy="storeTitle"></h2>
          <p data-copy="storeLead"></p>
          <div class="hero-actions">
            <a class="button button-primary" href="./store/" data-link="storeCta"></a>
            <a class="button button-ghost" href="./report/" data-link="reportCta"></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="covert-footer">
    <span>C.O.V.E.R.T</span>
    <span>Whale Land · Mission Travel Project</span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
