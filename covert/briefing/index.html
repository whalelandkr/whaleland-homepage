<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>C.O.V.E.R.T | Mission Briefing</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="briefing-page">
  <header class="covert-header">
    <a class="covert-brand" href="../">
      <img src="../assets/covert-agent-identification.png" alt="" />
      <span>C.O.V.E.R.T</span>
    </a>
  </header>

  <main class="briefing-hero">
    <section class="briefing-card">
      <p class="eyebrow">INCOMING MISSION</p>
      <h1 class="briefing-title">Receive<br />Mission</h1>
      <p class="briefing-lead">
        Choose your mission language. The message will be transmitted once and then you will be moved to the field file.
      </p>

      <div class="mission-language-grid">
        <a class="mission-language-button" href="../mission/?lang=kr">
          <strong>미션 받기</strong>
          <span>KR</span>
        </a>
        <a class="mission-language-button" href="../mission/?lang=en">
          <strong>Receive Mission</strong>
          <span>EN</span>
        </a>
        <a class="mission-language-button" href="../mission/?lang=jp">
          <strong>ミッションを受け取る</strong>
          <span>JP</span>
        </a>
        <a class="mission-language-button" href="../mission/?lang=cn">
          <strong>领取任务</strong>
          <span>CN</span>
        </a>
      </div>
    </section>

    <img class="briefing-bumi" src="../assets/bumi/bumi-black-suit.png" alt="" />
  </main>

</html>
