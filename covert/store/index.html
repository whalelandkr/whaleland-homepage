<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>C.O.V.E.R.T | Field Sale</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="store-page">
  <main class="store-main">
    <div class="store-header-row">
      <nav class="language-switcher" aria-label="Language selector">
        <button type="button" data-lang="kr">KR</button>
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="jp">JP</button>
        <button type="button" data-lang="cn">CN</button>
      </nav>
    </div>

    <section class="today-card">
      <p class="today-label" id="todayLabel"></p>
      <h1 class="today-date" id="todayDate"></h1>

      <div class="today-message">
        <h1 id="todayTitle"></h1>
        <p id="todayBody"></p>
      </div>

      <img src="../assets/bumi/bumi-default.png" alt="" class="store-character" />
    </section>

    <section class="schedule-grid" id="scheduleGrid"></section>

    <section class="shop-area">
      <h2 id="shopTitle"></h2>
      <p id="shopBody"></p>

      <button class="button button-primary disabled-shop-button" type="button" id="shopButton" disabled></button>
      <button class="help-button" type="button" id="helpButton" aria-label="help">?</button>

      <div class="help-box" id="helpBox" hidden></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
