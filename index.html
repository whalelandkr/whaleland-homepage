<!doctype html>
<html lang="ko" data-page="home">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whale Land</title>
  <meta name="description" content="Whale Land idea company" />
  <link rel="icon" href="./assets/whaleland-logo.png" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" onload="this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" /></noscript>
  <style>
    /* Gmarket Sans — display face for headings (SIL OFL, free for commercial use) */
    @font-face {
      font-family: 'Gmarket Sans';
      font-weight: 500;
      font-style: normal;
      font-display: swap;
      src: url('https://cdn.jsdelivr.net/gh/fonts-archive/GmarketSans/GmarketSansMedium.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/fonts-archive/GmarketSans/GmarketSansMedium.woff') format('woff');
    }
    @font-face {
      font-family: 'Gmarket Sans';
      font-weight: 700;
      font-style: normal;
      font-display: swap;
      src: url('https://cdn.jsdelivr.net/gh/fonts-archive/GmarketSans/GmarketSansBold.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/fonts-archive/GmarketSans/GmarketSansBold.woff') format('woff');
    }
  </style>
  <link rel="stylesheet" href="./home.css?v=10" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html" data-home-link aria-label="Whale Land home">
      <img src="./assets/whaleland-logo.png" alt="" />
      <span>Whale Land</span>
    </a>

    <nav class="desktop-nav" aria-label="Main navigation">
      <a href="#company" data-home-section="company" data-i18n="common.navCompany"></a>
      <a href="#service-story" data-home-section="service-story" data-i18n="common.navServiceIntro"></a>
      <a href="#service-list" data-home-section="service-list" data-i18n="common.navServiceList"></a>
      <a href="#contact" data-home-section="contact" data-i18n="common.navContact"></a>
    </nav>

    <div class="header-actions">
      <nav class="language-nav" aria-label="Language selector">
        <button type="button" data-lang="ko">KR</button>
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="ja">JP</button>
        <button type="button" data-lang="zh-cn">CN</button>
      </nav>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-label="Menu">
        <span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-panel" aria-label="Mobile navigation">
    <a href="#company" data-home-section="company" data-i18n="common.navCompany"></a>
    <a href="#service-story" data-home-section="service-story" data-i18n="common.navServiceIntro"></a>
    <a href="#service-list" data-home-section="service-list" data-i18n="common.navServiceList"></a>
    <a href="#contact" data-home-section="contact" data-i18n="common.navContact"></a>
  </nav>

  <main class="home-main">
    <!-- Chapter 1 · Logo -->
    <section class="chapter logo-chapter" id="top">
      <div class="hero-blob hero-blob-blue" aria-hidden="true"></div>
      <div class="hero-blob hero-blob-violet" aria-hidden="true"></div>
      <div class="hero-blob hero-blob-teal" aria-hidden="true"></div>

      <div class="logo-stage">
        <div class="logo-mark-wrap hero-rise" style="--rise:.08s">
          <img class="logo-stage-mark" src="./assets/whaleland-logo.png" alt="Whale Land" />
        </div>
        <h1 class="logo-stage-title-sr">Whale Land</h1>
      </div>

    </section>

    <!-- Chapter 2 · About -->
    <section class="chapter intro-chapter" id="company">
      <div class="section-inner intro-card">
        <p class="eyebrow reveal" data-i18n="home.introEyebrow"></p>
        <h2 class="intro-title reveal" style="--rd:.08s" data-i18n="home.introTitle"></h2>
        <p class="intro-body reveal" style="--rd:.18s" data-i18n="home.introBody"></p>
      </div>
    </section>

    <!-- Chapters 3–5 · Services (rendered by app.js) -->
    <div class="service-story-chapters" id="service-story" aria-label="Service introductions"></div>

    <!-- Chapter 6 · Service hub -->
    <section class="chapter service-list-chapter" id="service-list">
      <div class="section-inner">
        <div class="service-list-head">
          <p class="eyebrow reveal" data-i18n="home.serviceListEyebrow"></p>
          <h2 class="section-title reveal" style="--rd:.08s" data-i18n="home.serviceListTitle"></h2>
          <p class="section-body reveal" style="--rd:.16s" data-i18n="home.serviceListBody"></p>
        </div>

        <div class="service-list-grid" id="serviceList"></div>
      </div>
    </section>

    <!-- Chapter 7 · Contact -->
    <section class="chapter contact-chapter" id="contact">
      <div class="section-inner">
        <div class="contact-card reveal">
          <div class="contact-copy">
            <p class="eyebrow contact-eyebrow" data-i18n="home.contactEyebrow"></p>
            <h2 class="contact-title" data-i18n="home.contactTitle"></h2>
            <p class="contact-body" data-i18n="home.contactBody"></p>
          </div>

          <div class="contact-actions" aria-label="Contact information">
            <a class="contact-line" data-contact-phone-link href="#">
              <span data-i18n="home.contactPhoneLabel"></span>
              <strong data-contact-phone-text></strong>
            </a>
            <a class="contact-line" data-contact-email-link href="#">
              <span data-i18n="home.contactEmailLabel"></span>
              <strong data-contact-email-text></strong>
            </a>
            <button class="copy-email-button" type="button" data-copy-email data-i18n="home.contactCopyEmail"></button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-grid">
        <div class="footer-left">
          <div class="footer-brand">
            <img src="./assets/whaleland-logo.png" alt="" />
            <div>
              <strong>Whale Land</strong>
              <span data-i18n="common.footerLine"></span>
            </div>
          </div>

          <div class="footer-legal">
            <p class="footer-company-name" data-i18n="common.companyName"></p>
            <p class="footer-biz">
              <span data-i18n="common.bizCeoLabel"></span> <span data-i18n="common.bizCeo"></span>
              <span class="footer-sep">|</span>
              <span data-i18n="common.bizNoLabel"></span> <span data-i18n="common.bizNo"></span>
              <span class="footer-sep">|</span>
              <span data-i18n="common.mailOrderLabel"></span> <span data-i18n="common.mailOrderNo"></span>
            </p>
            <p class="footer-biz">
              <span data-i18n="common.addressLabel"></span> <span data-i18n="common.address"></span>
            </p>
            <p class="footer-biz">
              <span data-i18n="common.phoneLabel"></span> <a data-contact-phone-link href="#"></a>
              <span class="footer-sep">|</span>
              <span data-i18n="common.emailLabel"></span> <a data-contact-email-link href="#"></a>
            </p>
            <p class="footer-copyright" data-i18n="common.copyright"></p>
          </div>
        </div>

        <div class="footer-right">
          <nav class="footer-policy" aria-label="Policies">
            <a href="#" data-i18n="common.footerTerms"></a>
            <a href="#" data-i18n="common.footerPrivacy"></a>
          </nav>
          <nav class="footer-social" aria-label="Social channels">
            <a href="https://pf.kakao.com/_siihX" target="_blank" rel="noopener noreferrer" aria-label="KakaoTalk channel">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="currentColor">
                <path d="M12 3C6.98 3 2.9 6.24 2.9 10.23c0 2.54 1.7 4.77 4.27 6.05-.18.63-.66 2.36-.76 2.73-.12.46.17.45.36.33.15-.1 2.35-1.6 3.3-2.25.63.09 1.28.14 1.93.14 5.02 0 9.1-3.24 9.1-7.23S17.02 3 12 3z"/>
              </svg>
            </a>
          </nav>
        </div>
      </div>
    </div>
  </footer>

  <script src="./app.js?v=10"></script>
</body>
</html>
