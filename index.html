<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Whale Land</title><meta name="description" content="Choose a language to enter Whale Land."><style>*{box-sizing:border-box}body{margin:0;min-height:100svh;display:grid;place-items:center;color:#f4efe7;background:radial-gradient(circle at 70% 20%,#233467 0,transparent 28%),radial-gradient(circle at 30% 80%,#15534f 0,transparent 26%),#08141d;font-family:Inter,system-ui,sans-serif}.wrap{width:min(780px,calc(100% - 32px));text-align:center}.mark{width:72px;height:72px;border-radius:23px}.k{margin:30px 0 0;color:#76ddd7;font-size:.72rem;font-weight:900;letter-spacing:.2em}.t{margin:14px 0 0;font-size:clamp(3.2rem,10vw,7rem);line-height:.9;letter-spacing:-.07em}.d{margin:22px 0 34px;color:#9caaaF}.langs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.langs a{padding:20px 12px;border:1px solid rgba(255,255,255,.14);border-radius:18px;color:#fff;text-decoration:none;font-weight:850;background:rgba(255,255,255,.04);transition:.2s}.langs a:hover{transform:translateY(-3px);background:rgba(255,255,255,.09)}@media(max-width:560px){.langs{grid-template-columns:1fr 1fr}}</style></head><body><main class="wrap"><img class="mark" src="assets/whaleland-mark.svg" alt=""><p class="k">WHALE LAND / SELECT LANGUAGE</p><h1 class="t">Enter<br>the worlds.</h1><p class="d">Choose your language / 언어를 선택하세요</p><nav class="langs"><a href="ko/" data-lang="ko">한국어</a><a href="en/" data-lang="en">English</a><a href="ja/" data-lang="ja">日本語</a><a href="zh-cn/" data-lang="zh-cn">简体中文</a></nav></main><script>(()=>{document.querySelectorAll('[data-lang]').forEach(a=>a.onclick=()=>localStorage.setItem('whalelandLanguage',a.dataset.lang));const p=new URLSearchParams(location.search);if(p.get('choose')==='1')return;const saved=localStorage.getItem('whalelandLanguage');if(['ko','en','ja','zh-cn'].includes(saved))location.replace(`${saved}/`)})();</script></body></html>
