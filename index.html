<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whale Land</title>
  <meta name="description" content="Whale Land language selector" />
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, "Noto Sans KR", "Noto Sans JP", "Noto Sans SC", sans-serif;
      background: #f5f9fc;
      color: #10243a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 22%, rgba(102, 197, 224, 0.18), transparent 33%),
        linear-gradient(180deg, #fbfdff, #eef5f8);
    }

    main {
      width: min(680px, calc(100% - 32px));
      padding: 48px 28px;
      border: 1px solid rgba(16, 36, 58, 0.10);
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 24px 70px rgba(16, 36, 58, 0.10);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4.2rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 14px 0 30px;
      color: #64758a;
      line-height: 1.7;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    a {
      display: flex;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(16, 36, 58, 0.12);
      border-radius: 16px;
      color: #10243a;
      background: #fff;
      text-decoration: none;
      font-weight: 800;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(16, 36, 58, 0.10);
    }

    @media (max-width: 480px) {
      nav {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Whale Land</h1>
    <p>Choose your language / 언어를 선택하세요</p>

    <nav aria-label="Language selector">
      <a href="./ko/" data-language="ko">한국어</a>
      <a href="./en/" data-language="en">English</a>
      <a href="./ja/" data-language="ja">日本語</a>
      <a href="./zh-cn/" data-language="zh-cn">简体中文</a>
    </nav>
  </main>

  <script>
    (() => {
      const savedLanguage = localStorage.getItem("whalelandLanguage");
      const supported = ["ko", "en", "ja", "zh-cn"];

      if (supported.includes(savedLanguage)) {
        window.location.replace(`./${savedLanguage}/`);
        return;
      }

      const browserLanguage = (navigator.language || "").toLowerCase();
      let language = "ko";

      if (browserLanguage.startsWith("ja")) {
        language = "ja";
      } else if (browserLanguage.startsWith("zh")) {
        language = "zh-cn";
      } else if (browserLanguage.startsWith("en")) {
        language = "en";
      }

      window.setTimeout(() => {
        window.location.replace(`./${language}/`);
      }, 650);

      document.querySelectorAll("[data-language]").forEach((link) => {
        link.addEventListener("click", () => {
          localStorage.setItem("whalelandLanguage", link.dataset.language);
        });
      });
    })();
  </script>
</body>
</html>
