<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C.O.V.E.R.T | final report</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="report-page" data-page="report">
  <header class="site-header">
    <div class="header-balance" aria-hidden="true"></div>

    <a class="brand-center" href="index.html" aria-label="C.O.V.E.R.T home">
      C.O.V.E.R.T
    </a>

    <nav class="language-switcher" aria-label="Language selector">
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="kr">KR</button>
      <button type="button" data-lang="cn">CN</button>
      <button type="button" data-lang="jp">JP</button>
    </nav>
  </header>

  <main class="report-shell">
    <section class="report-panel" id="reportPanel">
      <h1 class="report-kicker report-kicker-main" data-simple-i18n="finalReport">
        FINAL REPORT
      </h1>

      <form
        class="report-form-page simple-report-form"
        id="simpleReportForm"
        enctype="multipart/form-data"
        novalidate
      >
        <div class="field-group full">
          <label class="field-label" for="reportText" data-simple-i18n="reportLabel">
            보고
          </label>
          <textarea
            id="reportText"
            name="reportText"
            maxlength="1000"
            required
            data-simple-placeholder="reportPlaceholder"
            placeholder="미션 결과를 보고해주세요."
          ></textarea>
        </div>

        <div class="field-group full">
          <label class="field-label" for="reportImage" data-simple-i18n="imageLabel">
            이미지 첨부 (선택)
          </label>

          <label class="image-upload-box" for="reportImage">
            <span class="image-upload-mark" aria-hidden="true">+</span>
            <span data-simple-i18n="imageButton">이미지 선택</span>
          </label>

          <input
            class="image-file-input"
            id="reportImage"
            name="reportImage"
            type="file"
            accept="image/*"
          />

          <div class="image-preview" id="imagePreview" aria-live="polite" hidden>
            <img id="imagePreviewImage" alt="선택한 이미지 미리보기" />

            <div class="image-preview-info">
              <span id="imageFileName"></span>
              <button
                class="image-remove-button"
                id="removeImageButton"
                type="button"
                data-simple-i18n="removeImage"
              >
                삭제
              </button>
            </div>
          </div>
        </div>

        <div class="field-group full">
          <label class="field-label" for="email" data-simple-i18n="emailLabel">
            다음 미션을 받을 이메일
          </label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            data-simple-placeholder="emailPlaceholder"
            placeholder="example@email.com (선택)"
          />
        </div>

        <div class="field-group full consent-box">
          <label class="consent-row">
            <input id="marketingAgree" name="marketingAgree" type="checkbox" />
            <span data-simple-i18n="marketingAgreeText">
              광고성 정보 수신에 동의합니다. 다음 스탬프 북, 도시별 미션, 상품, 이벤트, 할인 정보 등을 이메일로 받을 수 있습니다.
            </span>
          </label>
        </div>

        <div class="form-actions-page simple-form-actions">
          <button class="send-button" id="sendReportButton" type="submit" data-simple-i18n="sendButton">
            Send Report
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="report.js"></script>
</body>
</html>
