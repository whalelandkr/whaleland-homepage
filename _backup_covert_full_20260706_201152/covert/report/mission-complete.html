<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C.O.V.E.R.T | mission complete</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="mission-complete-page">
  <main class="mission-sequence" aria-live="polite">
    <section class="mission-complete-intro" id="missionCompleteIntro">
      <div class="complete-logo-badge" aria-hidden="true">
        <div class="complete-logo-core">
          <img src="assets/covert-agent-identification.png" alt="" />
        </div>
      </div>

      <h1 class="mission-complete-heading">MISSION COMPLETE</h1>
    </section>

    <section class="terminal-screen" id="terminalScreen" hidden>
      <div class="terminal-inner">
        <p class="terminal-text" id="terminalText"></p>
        <span class="terminal-cursor" id="terminalCursor" aria-hidden="true">█</span>
      </div>
    </section>
  </main>

  <div
    class="signal-noise-overlay"
    id="signalNoiseOverlay"
    aria-hidden="true"
  ></div>

  <script src="mission-complete.js"></script>
</body>
</html>
